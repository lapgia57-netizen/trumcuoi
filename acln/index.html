<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeNotes - Sổ Tay Cá Nhân</title>
  
  <!-- Favicon / Icon Trang web -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📓</text></svg>">
  
  <!-- CSS Framework (Tailwind CSS) & Font Awesome Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

  <!-- Header Header -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white text-xl shadow-md shadow-indigo-100">
          <i class="fa-solid fa-journal-whills"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-900 leading-none">LifeNotes</h1>
          <span class="text-xs text-slate-400">Lưu trữ cá nhân hoá</span>
        </div>
      </div>
      
      <!-- User Profile -->
      <div id="userProfile" class="hidden flex items-center space-x-3">
        <img id="userAvatar" class="w-9 h-9 rounded-full border-2 border-indigo-500/20" src="" alt="Avatar">
        <div class="hidden sm:block text-left">
          <p id="userName" class="text-xs font-semibold text-slate-800"></p>
          <p id="userEmail" class="text-[10px] text-slate-400"></p>
        </div>
        <button id="logoutBtn" class="text-xs bg-slate-100 hover:bg-red-50 hover:text-red-600 text-slate-600 px-3 py-2 rounded-xl transition flex items-center gap-1 font-medium">
          <i class="fa-solid fa-right-from-bracket"></i> <span class="hidden sm:inline">Thoát</span>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8 flex-grow w-full">
    
    <!-- Màn hình Đăng Nhập -->
    <div id="loginSection" class="text-center py-16 bg-white rounded-3xl shadow-sm border border-slate-200/80 my-8">
      <div class="max-w-md mx-auto px-6">
        <div class="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-5 text-3xl shadow-inner">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-900 mb-2">Đăng Nhập Cá Nhân</h2>
        <p class="text-slate-500 mb-8 text-sm leading-relaxed">Mỗi tài khoản Google sẽ có không gian lưu trữ dữ liệu hoàn toàn tách biệt và được bảo mật.</p>
        
        <button id="loginBtn" class="w-full flex items-center justify-center space-x-3 bg-white hover:bg-slate-50 border border-slate-300 text-slate-700 font-medium py-3.5 px-4 rounded-2xl shadow-sm transition active:scale-[0.98]">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
          </svg>
          <span>Tiếp tục với Google</span>
        </button>
      </div>
    </div>

    <!-- Màn hình Quản Lý Dữ Liệu -->
    <div id="appSection" class="hidden space-y-6">
      
      <!-- Form Nhập Ghi Chép -->
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h3 class="text-base font-semibold text-slate-800 mb-4 flex items-center gap-2">
          <i class="fa-solid fa-pen-clip text-indigo-600"></i> Ghi chép vấn đề mới
        </h3>
        <form id="noteForm" class="space-y-4">
          <div>
            <input type="text" id="noteTitle" placeholder="Tiêu đề vấn đề..." required
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm">
          </div>
          <div>
            <textarea id="noteContent" rows="3" placeholder="Chi tiết nội dung hoặc giải pháp..." required
              class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 text-sm resize-none"></textarea>
          </div>
          <div class="flex justify-between items-center">
            <select id="noteCategory" class="px-3 py-2 rounded-xl border border-slate-200 text-xs bg-slate-50 text-slate-600 focus:outline-none">
              <option value="💚 Sức khỏe">💚 Sức khỏe</option>
              <option value="💼 Công việc">💼 Công việc</option>
              <option value="👤 Cá nhân">👤 Cá nhân</option>
              <option value="💰 Tài chính">💰 Tài chính</option>
            </select>
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-5 py-2 rounded-xl text-sm shadow-sm shadow-indigo-100 transition flex items-center gap-2">
              <i class="fa-solid fa-plus text-xs"></i> Lưu lại
            </button>
          </div>
        </form>
      </div>

      <!-- Danh Sách Ghi Chép -->
      <div class="space-y-4">
        <div class="flex items-center justify-between">
          <h3 class="text-sm font-semibold text-slate-700 flex items-center gap-2">
            <i class="fa-solid fa-box-archive text-slate-400"></i> Ghi chép đã lưu
          </h3>
          <span id="noteCount" class="text-xs font-normal text-indigo-600 bg-indigo-50 px-2.5 py-1 rounded-full font-medium">0 mục</span>
        </div>
        
        <div id="notesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- Render danh sách bài viết từ Realtime Database -->
        </div>
      </div>

    </div>

  </main>

  <!-- Script Firebase Modular SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Cấu hình Firebase của bạn
    const firebaseConfig = {
      apiKey: "AIzaSyDVRzkeY2reKjR5Gv0dHx55geqgivUjEAQ",
      authDomain: "urf1forall.firebaseapp.com",
      databaseURL: "https://urf1forall-default-rtdb.firebaseio.com",
      projectId: "urf1forall",
      storageBucket: "urf1forall.firebasestorage.app",
      messagingSenderId: "335719421403",
      appId: "1:335719421403:web:318271ac430dfb4ca4c3fe",
      measurementId: "G-3YRBPDMHK0"
    };

    // Khởi tạo các dịch vụ
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // DOM Elements
    const loginSection = document.getElementById("loginSection");
    const appSection = document.getElementById("appSection");
    const userProfile = document.getElementById("userProfile");
    const userAvatar = document.getElementById("userAvatar");
    const userName = document.getElementById("userName");
    const userEmail = document.getElementById("userEmail");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const noteForm = document.getElementById("noteForm");
    const notesContainer = document.getElementById("notesContainer");
    const noteCount = document.getElementById("noteCount");

    let currentUser = null;

    // Đăng nhập
    loginBtn.addEventListener("click", async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (err) {
        console.error("Lỗi đăng nhập:", err);
        alert("Đăng nhập thất bại, vui lòng thử lại!");
      }
    });

    // Đăng xuất
    logoutBtn.addEventListener("click", () => signOut(auth));

    // Lắng nghe trạng thái đăng nhập
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        userAvatar.src = user.photoURL || "https://via.placeholder.com/40";
        userName.textContent = user.displayName;
        userEmail.textContent = user.email;

        userProfile.classList.remove("hidden");
        loginSection.classList.add("hidden");
        appSection.classList.remove("hidden");

        // Lắng nghe dữ liệu trong thư mục riêng: users/{UID}/notes
        loadUserNotes(user.uid);
      } else {
        currentUser = null;
        userProfile.classList.add("hidden");
        loginSection.classList.remove("hidden");
        appSection.classList.add("hidden");
      }
    });

    // Thêm ghi chép mới
    noteForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentUser) return;

      const title = document.getElementById("noteTitle").value.trim();
      const content = document.getElementById("noteContent").value.trim();
      const category = document.getElementById("noteCategory").value;

      if (!title || !content) return;

      // Đường dẫn dữ liệu phân tách theo UID người dùng
      const userNotesRef = ref(db, `users/${currentUser.uid}/notes`);
      
      await push(userNotesRef, {
        title: title,
        content: content,
        category: category,
        timestamp: Date.now()
      });

      noteForm.reset();
    });

    // Lấy dữ liệu thời gian thực theo UID
    function loadUserNotes(uid) {
      const userNotesRef = ref(db, `users/${uid}/notes`);

      onValue(userNotesRef, (snapshot) => {
        notesContainer.innerHTML = "";
        const data = snapshot.val();

        if (!data) {
          noteCount.textContent = "0 mục";
          notesContainer.innerHTML = `
            <div class="col-span-full text-center py-12 text-slate-400">
              <i class="fa-regular fa-folder-open text-3xl mb-2 block"></i>
              Chưa có dữ liệu nào được lưu cho tài khoản này.
            </div>
          `;
          return;
        }

        const entries = Object.entries(data).reverse(); // Hiện bài mới nhất lên đầu
        noteCount.textContent = `${entries.length} mục`;

        entries.forEach(([id, note]) => {
          const card = createNoteCard(id, note, uid);
          notesContainer.appendChild(card);
        });
      });
    }

    // Tạo giao diện thẻ ghi chép
    function createNoteCard(id, data, uid) {
      const div = document.createElement("div");
      div.className = "bg-white p-5 rounded-2xl border border-slate-200/80 shadow-sm flex flex-col justify-between hover:shadow-md transition";
      
      const dateStr = data.timestamp ? new Date(data.timestamp).toLocaleDateString('vi-VN') : '';

      div.innerHTML = `
        <div>
          <div class="flex items-center justify-between mb-3">
            <span class="text-xs px-2.5 py-1 rounded-lg bg-slate-100 font-medium text-slate-600">${data.category}</span>
            <div class="flex items-center gap-2">
              <span class="text-[11px] text-slate-400">${dateStr}</span>
              <button class="delete-btn text-slate-300 hover:text-red-500 text-sm p-1 transition">
                <i class="fa-regular fa-trash-can"></i>
              </button>
            </div>
          </div>
          <h4 class="font-bold text-slate-800 mb-1.5 leading-snug">${escapeHtml(data.title)}</h4>
          <p class="text-slate-600 text-sm whitespace-pre-line leading-relaxed">${escapeHtml(data.content)}</p>
        </div>
      `;

      // Xóa ghi chép
      div.querySelector(".delete-btn").addEventListener("click", async () => {
        if (confirm("Xóa ghi chép này khỏi tài khoản của bạn?")) {
          const itemRef = ref(db, `users/${uid}/notes/${id}`);
          await remove(itemRef);
        }
      });

      return div;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
