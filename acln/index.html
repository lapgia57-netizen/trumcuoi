<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LifeNotes - Sổ Tay Cá Nhân</title>

  <!-- Favicon (Icon trên tab trình duyệt) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

  <!-- Header có đính kèm Icon -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
      <div class="flex items-center space-x-2">
        <!-- App Icon -->
        <div class="w-9 h-9 bg-indigo-600 text-white rounded-xl flex items-center justify-center shadow-sm">
          <i class="fa-solid fa-book-bookmark text-lg"></i>
        </div>
        <h1 class="text-xl font-bold text-slate-900 tracking-tight">LifeNotes</h1>
      </div>
      
      <!-- User Profile / Auth State -->
      <div id="userProfile" class="hidden flex items-center space-x-3">
        <img id="userAvatar" class="w-8 h-8 rounded-full border border-slate-300 object-cover" src="" alt="Avatar">
        <span id="userName" class="text-sm font-medium text-slate-700 hidden sm:inline"></span>
        <button id="logoutBtn" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg transition flex items-center gap-1">
          <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-4 py-8 flex-grow w-full">
    
    <!-- Màn hình Đăng Nhập -->
    <div id="loginSection" class="text-center py-16 bg-white rounded-2xl shadow-sm border border-slate-200/80 my-8">
      <div class="max-w-md mx-auto px-6">
        <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-900 mb-2">Sổ Tay Lưu Trữ Cá Nhân</h2>
        <p class="text-slate-500 mb-6 text-sm">Mỗi tài khoản Google sẽ có không gian lưu trữ hoàn toàn riêng biệt và bảo mật.</p>
        
        <button id="loginBtn" class="w-full flex items-center justify-center space-x-3 bg-white hover:bg-slate-50 border border-slate-300 text-slate-700 font-medium py-3 px-4 rounded-xl shadow-sm transition">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
          </svg>
          <span>Đăng nhập bằng Google</span>
        </button>
      </div>
    </div>

  </main>
</body>
</html>
